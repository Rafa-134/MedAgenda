<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - MedAgenda</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="cabecalho">

            <div class="marca">
                <h1>MedAgenda</h1>
            </div>

            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="especialidades.html">Especialidades</a></li>
                    <li><a href="planos.html">Planos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <main>

        <section class="titulo-pagina">

            <h2>Entre em Contato</h2>

            <p>
                Caso tenha dúvidas sobre a plataforma,
                preencha o formulário abaixo.
            </p>

        </section>

        <section class="area-formulario">

            <form class="form-contato">

                <div class="campo">
                    <label for="nome">Nome Completo *</label>

                    <input
                        type="text"
                        id="nome"
                        required>
                </div>

                <div class="campo">
                    <label for="email">E-mail *</label>

                    <input
                        type="email"
                        id="email"
                        required>
                </div>

                <div class="campo">
                    <label for="telefone">Telefone *</label>

                    <input
                        type="tel"
                        id="telefone"
                        required>
                </div>

                <div class="campo">
                    <label for="cidade">Cidade *</label>

                    <input
                        type="text"
                        id="cidade"
                        required>
                </div>

                <div class="campo">
                    <label for="atendimento">
                        Tipo de Atendimento *
                    </label>

                    <select id="atendimento" required>

                        <option value="">
                            Selecione uma opção
                        </option>

                        <option>
                            Informações sobre Planos
                        </option>

                        <option>
                            Suporte Técnico
                        </option>

                        <option>
                            Financeiro
                        </option>

                        <option>
                            Outros Assuntos
                        </option>

                    </select>
                </div>

                <div class="campo">
                    <label for="mensagem">
                        Mensagem
                    </label>

                    <textarea
                        id="mensagem"
                        placeholder="Digite sua mensagem">
                    </textarea>
                </div>

                

                <button type="submit" class="botao-enviar">
                    Enviar
                </button>

            </form>

        </section>

    </main>

    <footer>
        <p>
            © 2026 MedAgenda - Sistema para Gestão de Clínicas
        </p>
    </footer>

</body>
</html>
